<style>
:root{--navy:#071b2d;--navy2:#0c2941;--cyan:#00b9d8;--gold:#e8ae36;--bg:#f2f7fa;--card:#fff;--text:#10283a;--muted:#6c7d89;--line:#dce7ed;--shadow:0 15px 40px rgba(7,27,45,.10)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,"Segoe UI",sans-serif;background:linear-gradient(145deg,#eef6f9,#f9fbfc);color:var(--text)}
.topbar{background:linear-gradient(110deg,var(--navy),var(--navy2));color:#fff;padding:20px clamp(18px,4vw,54px);display:flex;justify-content:space-between;align-items:center;gap:20px}
.brand{display:flex;align-items:center;gap:18px}.brand img{width:145px;max-height:70px;object-fit:contain}h1{margin:0}.sub{color:var(--muted);font-size:13px}
.btn{border:0;border-radius:12px;padding:11px 15px;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:7px;text-decoration:none}
.btn-primary{background:var(--cyan);color:#062030}.btn-light{background:#edf5f8;color:var(--navy)}.btn-danger{background:#ffebe9;color:#9e2a20}
main{padding:28px clamp(16px,4vw,54px);max-width:1500px;margin:auto}.card{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}input{border:1px solid var(--line);border-radius:11px;padding:11px 13px;min-width:250px}
table{width:100%;border-collapse:collapse;min-width:900px}th{background:#edf5f8;text-align:right;padding:13px;position:sticky;top:0}td{padding:12px 13px;border-bottom:1px solid #edf2f5}.table-wrap{overflow:auto;max-height:650px}
.badge{display:inline-flex;padding:6px 10px;border-radius:999px;font-weight:800;font-size:12px;background:#dff8e8;color:#187846}.meta{margin:10px 0 20px;color:var(--muted)}
.toast{position:fixed;left:20px;bottom:20px;background:var(--navy);color:#fff;border-radius:12px;padding:13px 17px;display:none}
@media(max-width:700px){.topbar{flex-direction:column;align-items:flex-start}}
</style>

const EDIT_PASSWORD="1788";
let tickets=JSON.parse(localStorage.getItem("sindianaTickets")||"null")||INITIAL_DATA;
let cloud=null,unsubscribe=null;
const $=s=>document.querySelector(s);
const norm=s=>String(s||"").trim().toLowerCase();
const esc=x=>String(x??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
function toast(m){const t=$("#toast");t.textContent=m;t.style.display="block";setTimeout(()=>t.style.display="none",2500)}
function saveLocal(){localStorage.setItem("sindianaTickets",JSON.stringify(tickets));localStorage.setItem("sindianaUpdatedAt",new Date().toISOString())}
function archived(){const q=norm($("#search").value);return tickets.filter(t=>norm(t.STATUS)==="complete"&&(!q||norm(t.NUMBER).includes(q)||norm(t.SUBJECT).includes(q)))}
function render(){
 const data=archived();$("#count").textContent=`${data.length} קריאות בארכיון`;
 $("#body").innerHTML=data.map(t=>{const i=tickets.indexOf(t);return `<tr>
 <td><b>${esc(t.NUMBER)}</b></td><td>${esc(t.SUBJECT)}</td><td><span class="badge">Complete</span></td>
 <td>${esc(t["INCIDENT DATE"])}</td><td>${esc(t["LAST MESSAGE DATE"])}</td>
 <td><button class="btn btn-light restore" data-i="${i}">החזרה לראשי</button> <button class="btn btn-danger del" data-i="${i}">מחיקה</button></td>
 </tr>`}).join("");
 document.querySelectorAll(".restore").forEach(b=>b.onclick=()=>{
   const p=prompt("הזן סיסמה להחזרה מהארכיון");if(p!==EDIT_PASSWORD)return toast("סיסמה שגויה");
   tickets[+b.dataset.i].STATUS="In Progress";saveLocal();render();toast("הקריאה הוחזרה לדשבורד");
 });
 document.querySelectorAll(".del").forEach(b=>b.onclick=()=>{
   const p=prompt("הזן סיסמה למחיקה");if(p!==EDIT_PASSWORD)return toast("סיסמה שגויה");
   if(!confirm("למחוק את הקריאה לצמיתות?"))return;tickets.splice(+b.dataset.i,1);saveLocal();render();toast("הקריאה נמחקה");
 });
}
$("#search").oninput=render;$("#refreshBtn").onclick=()=>location.reload();
async function initCloud(c){
 if(!c?.apiKey||!c?.projectId||!c?.appId)return;
 try{
  const appMod=await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js");
  const fs=await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js");
  const app=appMod.initializeApp({apiKey:c.apiKey,authDomain:c.authDomain,projectId:c.projectId,storageBucket:c.storageBucket,messagingSenderId:c.senderId,appId:c.appId});
  const db=fs.getFirestore(app),ref=fs.doc(db,"dashboards",c.workspace||"sindiana-support");cloud={fs,ref};
  unsubscribe=fs.onSnapshot(ref,s=>{if(s.exists()&&Array.isArray(s.data().tickets)){tickets=s.data().tickets;saveLocal();render()}});
 }catch(e){console.error(e)}
}
const cfg=JSON.parse(localStorage.getItem("sindianaFirebase")||"null");if(cfg)initCloud(cfg);render();
